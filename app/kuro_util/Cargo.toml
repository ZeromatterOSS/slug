[package]
description = """
Unsorted utilities used by kuro. Not specific to kuro, generic enough to be used by other projects.
but not generic or stable enough to be published on crates.io as standalone crates.
"""
edition = "2024"
license = { workspace = true }
name = "kuro_util"
repository = { workspace = true }
version = "0.1.0"

[dependencies]
allocative = { workspace = true }
blake3 = { workspace = true }
dupe = { workspace = true }
futures = { workspace = true }
pagable = { workspace = true }
starlark_map = { workspace = true }
strong_hash = { workspace = true }
sysinfo = { workspace = true }
tracing = { workspace = true }
triomphe = { workspace = true }

kuro_error = { workspace = true }
kuro_wrapper_common = { workspace = true }
serde = { workspace = true }
static_assertions = { workspace = true }
tokio = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
perf-event = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[target.'cfg(windows)'.dependencies]
winapi = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

three_billion_instructions = { workspace = true }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(debug)", "cfg(kuro_asan)"] }
