name: build_example_conan
runs:
  using: composite
  steps:
  - name: Build examples/toolchains/conan_toolchain
    run: |-
      cd examples/toolchains/conan_toolchain
      $RUNNER_TEMP/artifacts/slug init
      cp -r ../../../prelude prelude
      # Generate Conan imports. TODO[AH] Make that unnecessary.
      PATH="$RUNNER_TEMP/artifacts:$PATH" $RUNNER_TEMP/artifacts/slug run //cpp/conan:update -v 2
      $RUNNER_TEMP/artifacts/slug build //... -v 2
      $RUNNER_TEMP/artifacts/slug test //... -v 2
    shell: bash
