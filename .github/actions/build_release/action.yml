name: build_release
description: Build slug binary (release)
runs:
  using: composite
  steps:
  - uses: Swatinem/rust-cache@v2
    with:
      prefix-key: slug-release
  - name: Build slug binary (release)
    run: |-
      mkdir $RUNNER_TEMP/artifacts
      cargo build --bin=slug --release -Z unstable-options --artifact-dir=$RUNNER_TEMP/artifacts
    shell: bash
