name: build_release
description: Build kuro binary (release)
runs:
  using: composite
  steps:
  - uses: Swatinem/rust-cache@v2
    with:
      prefix-key: kuro-release
  - name: Build kuro binary (release)
    run: |-
      mkdir $RUNNER_TEMP/artifacts
      cargo build --bin=kuro --release -Z unstable-options --artifact-dir=$RUNNER_TEMP/artifacts
    shell: bash
